# Author H. Frost, STFC Daresbury Lab

# If a pull request (PR) says it closes an issue, any TODO or comment that still points at the issue number will become a reference once the issue is closed.
# This workflow reads the closing clause from the PR description, then greps the source tree for the corresponding issue <#number> references
# and fails if any remain, so a reviewer no longer has to check by hand.

name: Check for references to closed issues

on:
  pull_request:
    branches:
      - master
      - 'release_candidate_*'

jobs:
  check_closed_issue_references:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for lingering references to closed issues
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Pull issue numbers of any "Closes #<number>" clause (case insensitive)
          # "|| true" stops the step failing when pr closes nothing

          issues=$(printf '%s' "$PR_BODY" | grep -oiE 'closes #([0-9]+)' | grep -oE '[0-9]+' | sort -u || true)

          if [ -z "$issues" ]; then
            echo "No issues closed by this PR."
            exit 0
          fi

          status=0
          for issue in $issues; do
            echo "Searching for references to closed issue #$issue..."
            # \b is a word boundary, so we don't match e.g. #1234 when looking for #123
            # grep exits 0 when it finds a match - hit means we must fail
            if grep -rnE "#$issue\b" \
                --include='*.py' \
                --include='*.md' \
                --include='*.rst' \
                --include='Makefile' . ; then
              echo "::error::This PR closes issue #$issue, but the references above still point to it. Please resolve them before merging."
              status=1
            else
              echo "No references to issue #$issue found."
            fi
          done
          exit $status
